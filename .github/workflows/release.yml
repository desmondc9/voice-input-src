name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwayland-dev cmake clang libclang-dev libasound2-dev meson ninja-build pkg-config
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --buildtype=release --prefix=/usr -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build CPU .deb
        run: cargo deb
      - uses: actions/upload-artifact@v5
        with:
          name: deb-cpu
          path: target/debian/voice-input_*.deb

  build-cuda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps (incl. CUDA toolkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwayland-dev cmake clang libclang-dev libasound2-dev nvidia-cuda-toolkit meson ninja-build pkg-config
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --buildtype=release --prefix=/usr -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build CUDA .deb
        # whisper.cpp defaults CMAKE_CUDA_ARCHITECTURES=native; on a GPU-less
        # CI runner that falls back to nvcc's ancient default (sm_52, Maxwell),
        # producing a binary that crashes on any modern card with
        # `CUDA kernel mul_mat_vec has no device code compatible with CUDA arch N`.
        # Target a fat list covering Turing -> Hopper so the .deb runs on every
        # relevant NVIDIA GPU (T4, RTX 20/30/40 series, A100, H100).
        env:
          CMAKE_CUDA_ARCHITECTURES: "75;80;86;89;90"
        run: cargo deb --variant cuda
      - uses: actions/upload-artifact@v5
        with:
          name: deb-cuda
          path: target/debian/voice-input-cuda_*.deb

  release:
    needs: [build-cpu, build-cuda]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb-cpu/voice-input_*.deb
            artifacts/deb-cuda/voice-input-cuda_*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
