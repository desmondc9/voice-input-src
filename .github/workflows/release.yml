name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-cpu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwayland-dev cmake clang libclang-dev libasound2-dev meson ninja-build pkg-config
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --buildtype=release --prefix=/usr -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build CPU .deb
        working-directory: linux
        run: cargo deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-cpu
          path: linux/target/debian/voice-input_*.deb

  build-cuda:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps (incl. CUDA toolkit)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwayland-dev cmake clang libclang-dev libasound2-dev nvidia-cuda-toolkit meson ninja-build pkg-config
      - name: Build gtk4-layer-shell from source
        run: |
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --buildtype=release --prefix=/usr -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false -Dvapi=false
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build CUDA .deb
        working-directory: linux
        run: cargo deb --variant cuda
      - uses: actions/upload-artifact@v4
        with:
          name: deb-cuda
          path: linux/target/debian/voice-input-cuda_*.deb

  release:
    needs: [build-cpu, build-cuda]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb-cpu/voice-input_*.deb
            artifacts/deb-cuda/voice-input-cuda_*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
